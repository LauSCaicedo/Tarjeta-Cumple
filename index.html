<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Salomé</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: 'Poppins', sans-serif;
}

/* FONDO ESTRELLAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* INTRO */
#intro {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#text {
  font-family: 'Special Elite', cursive;
  font-size: 34px;
  color: #ffb6c1;
  border-right: 3px solid pink;
  white-space: nowrap;
  overflow: hidden;
}

/* TARJETA */
#card {
  display: none;
  position: absolute;
  width: 100%;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

/* CONTENEDOR */
.poster {
  width: 350px;
  height: 600px;
  background: url("https://raw.githubusercontent.com/LauSCaicedo/Tarjeta-Cumple/main/invitation.png") center/contain no-repeat;
  box-shadow: 0 0 80px rgba(255,105,180,0.5);
  transform: scale(0.8);
  animation: reveal 2s forwards;
}

/* ANIMACIÓN REVELADO */
@keyframes reveal {
  from {opacity:0; transform: scale(0.6) rotate(-2deg);}
  to {opacity:1; transform: scale(1) rotate(0);}
}

/* FLASH */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: pink;
  opacity: 0;
}

/* BOTÓN */
button {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(45deg,#ff69b4,#ff1493);
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,105,180,0.8);
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="intro">
  <div id="text"></div>
</div>

<div class="flash" id="flash"></div>

<div id="card">
  <div class="poster"></div>
  <button onclick="confirmar()">Confirmar asistencia</button>
</div>

<audio id="bgSound" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7d2f.mp3">
</audio>

<script>

// ⭐ ESTRELLAS DINÁMICAS
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(drawStars);
}

drawStars();

// ✍️ TYPEWRITER
const text = "Se busca al vaquero o vaquera con más actitud de El Retiro…";
let i = 0;

function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  } else {
    setTimeout(showCard, 1500);
  }
}

typing();

// 🎬 TRANSICIÓN
function showCard(){

  document.getElementById("flash").style.opacity = "1";

  setTimeout(()=>{
    document.getElementById("flash").style.opacity = "0";
    document.getElementById("intro").style.display = "none";
    document.getElementById("card").style.display = "flex";
  },500);
}

// 🎵 AUDIO
document.body.addEventListener("click", ()=>{
  document.getElementById("bgSound").play();
},{once:true});

// 📲 BOTÓN
function confirmar(){
  window.open("https://wa.me/573147032379?text=Hola,%20confirmo%20asistencia%20al%20cumpleaños%20de%20Salomé");
}

</script>

</body>
</html>
