<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Salomé</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f3e4d2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Poppins';
}

/* TARJETA */
.card{
  width:380px;
  height:680px;
  background:#f5e6d3;
  border-radius:15px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  position:relative;
  padding:20px;
  overflow:hidden;
}

/* LUCES */
.lights{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

/* SOMBRERO */
.hat{
  position:absolute;
  top:20px;
  right:10px;
  width:110px;
}

/* LAZO */
.bow{
  position:absolute;
  top:20px;
  left:10px;
  width:110px;
}

/* TÍTULO */
.title{
  text-align:center;
  margin-top:90px;
  font-family:'Playfair Display';
  color:#d63384;
}

.subtitle{
  text-align:center;
  font-size:14px;
}

/* NOMBRE */
.name{
  text-align:center;
  font-size:48px;
  font-family:'Great Vibes';
  color:#e75480;
}

.lastname{
  text-align:center;
  font-size:22px;
  font-family:'Great Vibes';
  color:#e75480;
}

/* EDAD */
.badge{
  background:#e75480;
  color:white;
  padding:8px;
  border-radius:10px;
  text-align:center;
  width:200px;
  margin:10px auto;
}

/* INFO */
.info{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
  text-align:center;
  font-size:13px;
}

/* BOTAS */
.boots{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:130px;
}

/* CACTUS */
.cactus{
  position:absolute;
  bottom:90px;
  right:10px;
  width:90px;
}

/* LETRERO */
.sign{
  position:absolute;
  bottom:20px;
  left:15px;
  background:#8b5e3c;
  color:white;
  padding:15px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  transform:rotate(-5deg);
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.sign:hover{
  transform:rotate(-5deg) scale(1.05);
}

</style>
</head>

<body>

<div class="card">

  <!-- decoraciones -->
  <img class="bow" src="https://pngimg.com/uploads/bow/bow_PNG24.png">
  <img class="hat" src="https://pngimg.com/uploads/cowboy_hat/cowboy_hat_PNG38.png">

  <!-- contenido -->
  <div class="title">¡Yeehaw!</div>

  <div class="subtitle">
    Prepárate para una tarde llena de diversión,<br>
    juegos y mucha magia vaquera ✨
  </div>

  <div class="name">Salomé</div>
  <div class="lastname">Arrieta Henao</div>

  <div class="badge">Cumple 6 años</div>

  <div class="info">
    <div>
      📅 <br>9 mayo 2026
    </div>
    <div>
      ⏰ <br>2:30 PM
    </div>
    <div>
      📍 <br>El Retiro
    </div>
  </div>

  <!-- decoraciones inferiores -->
  <img class="boots" src="https://pngimg.com/uploads/boots/boots_PNG34.png">
  <img class="cactus" src="https://pngimg.com/uploads/cactus/cactus_PNG15.png">

  <!-- boton -->
  <div class="sign" onclick="confirmar()">
    Confirma tu asistencia<br>
    📞 314 703 2379
  </div>

</div>

<script>
function confirmar(){
  window.open("https://wa.me/573147032379");
}
</script>

</body>
</html>
