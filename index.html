<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Salomé</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f5e6d3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* TARJETA */
.card{
  width:360px;
  height:650px;
  background:#f5e6d3;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  position:relative;
  overflow:hidden;
  padding:20px;
}

/* DECORACIONES */
.hat{
  position:absolute;
  top:10px;
  right:10px;
  width:100px;
}

.bow{
  position:absolute;
  top:10px;
  left:10px;
  width:100px;
}

/* TÍTULO */
.title{
  text-align:center;
  margin-top:80px;
  font-family:'Playfair Display';
  color:#d63384;
}

.name{
  text-align:center;
  font-size:40px;
  font-family:'Great Vibes',cursive;
  color:#e75480;
}

/* INFO */
.info{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}

/* BOTAS */
.boots{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  width:120px;
}

/* CACTUS */
.cactus{
  position:absolute;
  bottom:60px;
  right:10px;
  width:80px;
}

/* LETRERO */
.sign{
  position:absolute;
  bottom:10px;
  left:10px;
  background:#8b5e3c;
  color:white;
  padding:15px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* ANIMACIONES */
.card{
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">

  <img class="hat" src="https://pngimg.com/uploads/cowboy_hat/cowboy_hat_PNG38.png">
  <img class="bow" src="https://pngimg.com/uploads/bow/bow_PNG24.png">

  <div class="title">
    <h2>¡Yeehaw!</h2>
    <p>Prepárate para una tarde llena de diversión,<br>juegos y magia vaquera ✨</p>
  </div>

  <div class="name">Salomé</div>
  <div class="name" style="font-size:20px;">Arrieta Henao</div>

  <div class="info">
    🎂 Cumple 6 años <br><br>
    📅 9 de mayo de 2026 <br>
    ⏰ 2:30 PM <br>
    📍 El Retiro
  </div>

  <img class="boots" src="https://pngimg.com/uploads/boots/boots_PNG34.png">
  <img class="cactus" src="https://pngimg.com/uploads/cactus/cactus_PNG15.png">

  <div class="sign" onclick="confirmar()">
    Confirma tu asistencia<br>
    📞 314 703 2379
  </div>

</div>

<script>
function confirmar(){
  window.open("https://wa.me/573147032379");
}
</script>

</body>
</html>
