<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Salomé</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(#1a0f14, #000);
  color: white;
  overflow: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #2a1620, #000);
  text-align: center;
}

#startBtn {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: #ff69b4;
  color: white;
  cursor: pointer;
}

/* TEXTO */
#text {
  font-family: 'Special Elite', cursive;
  font-size: 32px;
  color: #ffb6c1;
  border-right: 3px solid pink;
  white-space: nowrap;
  overflow: hidden;
}

/* TARJETA */
#card {
  display: none;
  height: 100vh;
  background: radial-gradient(circle, rgba(255,105,180,0.2), black);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* POSTER */
.poster {
  width: 360px;
  height: 620px;
  background: url("https://raw.githubusercontent.com/LauSCaicedo/Tarjeta-Cumple/main/invitation.png") center/cover no-repeat;
  border-radius: 20px;
  box-shadow: 0 0 80px rgba(255,105,180,0.6);
  animation: fadeIn 2s ease;
}

/* BOTÓN */
button {
  margin-top: 20px;
  background: linear-gradient(45deg,#ff69b4,#ff1493);
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  color: white;
  cursor: pointer;
}

@keyframes fadeIn {
  from {opacity:0; transform: scale(0.8);}
  to {opacity:1; transform: scale(1);}
}
</style>
</head>

<body>

<div id="intro">
  <div id="text"></div>
  <button id="startBtn">Entrar 🤠</button>
</div>

<div id="card">
  <div class="poster"></div>
  <button onclick="confirmar()">Confirmar asistencia</button>
</div>

<audio id="typingSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7d06a1f2b6.mp3"></audio>
<audio id="bgMusic" loop src="https://cdn.pixabay.com/audio/2023/03/06/audio_1e3b1bb9c1.mp3"></audio>

<script>
const text = "Se busca al vaquero o vaquera con más actitud de El Retiro…";
let i = 0;

function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);

    let t = document.getElementById("typingSound");
    t.currentTime = 0;
    t.play();

    i++;
    setTimeout(typing, 40);
  }
}

typing();

document.getElementById("startBtn").onclick = () => {
  document.getElementById("bgMusic").play();

  document.getElementById("intro").style.display = "none";
  document.getElementById("card").style.display = "flex";
};

function confirmar(){
  window.open("https://wa.me/573147032379?text=Hola,%20confirmo%20asistencia%20al%20cumpleaños%20de%20Salomé");
}
</script>

</body>
</html>
