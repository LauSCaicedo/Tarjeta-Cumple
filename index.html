<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Salomé</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: 'Poppins', sans-serif;
}

/* ESTRELLAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* INTRO */
#intro {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#text {
  font-family: 'Special Elite', cursive;
  font-size: 32px;
  color: #ffb6c1;
  border-right: 3px solid pink;
  white-space: nowrap;
  overflow: hidden;
}

/* TARJETA */
#card {
  display: none;
  position: absolute;
  width: 100%;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

/* POSTER */
.poster {
  width: 360px;
  height: 620px;
  background: url("https://raw.githubusercontent.com/LauSCaicedo/Tarjeta-Cumple/main/invitation.png") center/cover no-repeat;
  border-radius: 20px;
  box-shadow: 
    0 0 80px rgba(255,105,180,0.6),
    0 0 150px rgba(255,182,193,0.3);
  position: relative;
  transform: scale(0.8);
  animation: reveal 2s forwards, float 5s ease-in-out infinite;
}

/* REVEAL */
@keyframes reveal {
  from {opacity:0; transform: scale(0.6) rotate(-2deg);}
  to {opacity:1; transform: scale(1) rotate(0);}
}

/* FLOTACIÓN */
@keyframes float {
  0% { transform: translateY(0);}
  50% { transform: translateY(-15px);}
  100% { transform: translateY(0);}
}

/* GLOW */
.poster::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  background: radial-gradient(circle, rgba(255,182,193,0.3), transparent);
  animation: glow 5s infinite alternate;
}

@keyframes glow {
  from {opacity: 0.2;}
  to {opacity: 0.5;}
}

/* FLASH */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: pink;
  opacity: 0;
}

/* BOTÓN */
button {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(45deg,#ff69b4,#ff1493);
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,105,180,0.8);
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="intro">
  <div id="text"></div>
</div>

<div class="flash" id="flash"></div>

<div id="card">
  <div class="poster"></div>
  <button onclick="confirmar()">Confirmar asistencia</button>
</div>

<!-- AUDIOS -->
<audio id="typingSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7d06a1f2b6.mp3"></audio>
<audio id="bgMusic" loop src="https://cdn.pixabay.com/audio/2023/03/06/audio_1e3b1bb9c1.mp3"></audio>

<script>

/* ⭐ ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(drawStars);
}
drawStars();

/* 🔊 ACTIVAR AUDIO */
let audioStarted = false;
document.body.addEventListener("click", () => {
  if(!audioStarted){
    document.getElementById("bgMusic").play();
    audioStarted = true;
  }
});

/* ✍️ TYPEWRITER */
const text = "Se busca al vaquero o vaquera con más actitud de El Retiro…";
let i = 0;

function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);

    let t = document.getElementById("typingSound");
    t.currentTime = 0;
    t.play();

    i++;
    setTimeout(typing, 40);
  } else {
    setTimeout(showCard, 1200);
  }
}

typing();

/* 🎬 TRANSICIÓN */
function showCard(){
  let flash = document.getElementById("flash");
  flash.style.opacity = "1";

  setTimeout(()=>{
    flash.style.opacity = "0";
    document.getElementById("intro").style.display = "none";
    document.getElementById("card").style.display = "flex";
  }, 500);
}

/* 📲 BOTÓN */
function confirmar(){
  window.open("https://wa.me/573147032379?text=Hola,%20confirmo%20asistencia%20al%20cumpleaños%20de%20Salomé");
}

</script>

</body>
</html>
