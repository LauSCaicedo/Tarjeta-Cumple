<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Salomé</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: black;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  background: radial-gradient(circle, #1a1a1a, #000);
}

#intro-text {
  font-size: 28px;
  opacity: 0;
  animation: fadeInText 2.5s forwards;
}

@keyframes fadeInText {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* TARJETA */
#card {
  display: none;
  width: 100%;
  height: 100vh;
  position: relative;
  background: black;
}

/* IMAGEN */
#card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
  animation: zoomIn 2s ease;
}

@keyframes zoomIn {
  from {transform: scale(1.05);}
  to {transform: scale(1);}
}

/* BRILLOS */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: sparkleAnim 3s infinite;
}

@keyframes sparkleAnim {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0;}
}

/* BOTÓN */
button {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(45deg, #ff69b4, #ff1493);
  border: none;
  padding: 15px 30px;
  color: white;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,105,180,0.6);
}

button:hover {
  transform: translateX(-50%) scale(1.05);
}

/* FADE */
.fadeOut {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to {opacity: 0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-text">
    Se busca al vaquero o vaquera con más actitud de El Retiro…
  </div>
</div>

<!-- TARJETA -->
<div id="card">
  <img src="invitation.png" alt="Invitación">

  <button onclick="confirmar()">Confirmar asistencia</button>
</div>

<script>
// crear brillos
function createSparkles() {
  for (let i = 0; i < 30; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.top = Math.random() * 100 + "%";
    s.style.left = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 3 + "s";
    document.getElementById("card").appendChild(s);
  }
}

// transición
setTimeout(() => {
  document.getElementById("intro").classList.add("fadeOut");

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("card").style.display = "block";
    createSparkles();
  }, 1000);

}, 3000);

// botón
function confirmar() {
  window.open("https://wa.me/573147032379?text=Hola,%20confirmo%20asistencia%20al%20cumpleaños%20de%20Salomé");
}
</script>

</body>
</html>
